name: Verify example dashboard is in sync

# Three checks, all against whatever's currently in examples/ and docs/:
# 1. docs/index.html (the published demo) still matches what
#    scripts/build_dashboard.py would generate – catches someone editing
#    the example data and forgetting to rebuild before committing.
# 2. The recalibration agent's gate still passes and has signal on all
#    five score components – catches example-data edits that silently
#    break the demo's own premise (see scripts/verify_recalibration.py).
# 3. SCHEMA.md's documented Briefing pack example actually parses, and
#    docs/index.html's STATUS_ORDER matches scripts/_status.py – catches
#    documentation/parser and Python/JS drift (see
#    scripts/verify_consistency.py; this exact class of bug shipped once).
#    Same script also checks every example's score.value equals the sum of
#    its own breakdown, and that every Score rationale line has real
#    reasoning rather than just restating the number – both were real,
#    silent gaps found and fixed in the same dataset (see TESTING.md).
# 4. The most recently committed eval/results/*.json run still falls
#    within eval/expected_bands.json – catches someone loosening or
#    tightening a band without re-running the scoring eval against it
#    (see scripts/verify_eval_results.py). Does not itself run new
#    scoring – that's an LLM-interpreted step, not something CI can do
#    without an API key this repo deliberately doesn't use.
#
# No secrets, no API keys, nothing to configure – uses only the default
# GITHUB_TOKEN GitHub Actions provides automatically for checkout.

on:
  push:
    branches: [main]
    paths:
      - "examples/applications/**"
      - "docs/index.html"
      - "schema/SCHEMA.md"
      - "scripts/_status.py"
      - "scripts/build_dashboard.py"
      - "scripts/generate_examples.py"
      - "scripts/verify_recalibration.py"
      - "scripts/verify_consistency.py"
      - "scripts/verify_eval_results.py"
      - "eval/expected_bands.json"
      - "eval/results/**"
      - "config/weights.json"
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Rebuild dashboard from examples/
        run: python scripts/build_dashboard.py

      - name: Fail if docs/index.html doesn't match the committed version
        run: |
          if ! git diff --quiet -- docs/index.html; then
            echo "::error::docs/index.html is out of sync with examples/applications/. Run 'python scripts/build_dashboard.py' locally and commit the result."
            git diff -- docs/index.html
            exit 1
          fi
          echo "docs/index.html matches examples/applications/ – in sync."

      - name: Verify recalibration agent's gate and per-component signal
        run: python scripts/verify_recalibration.py

      - name: Verify SCHEMA.md/parser and Python/JS status-list consistency
        run: python scripts/verify_consistency.py

      - name: Verify latest eval run against expected score bands
        run: python scripts/verify_eval_results.py
